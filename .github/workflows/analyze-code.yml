name: Refresh telemetry block

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  count-lines:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq/cloc/locales
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq cloc locales curl
          sudo locale-gen en_US.UTF-8

      - name: Restore repos cache
        id: cache-repos
        uses: actions/cache@v4
        with:
          path: repos
          key: repos-${{ github.run_id }}
          restore-keys: repos-

      - name: Fetch or update repositories
        shell: bash
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail

          rm -rf output
          mkdir -p repos/public repos/private output

          get_repos() {
            local visibility=$1
            local page=1
            while :; do
              result=$(curl -H "Authorization: token $GH_PAT" -s "https://api.github.com/user/repos?visibility=${visibility}&per_page=100&page=${page}")
              names=$(echo "$result" | jq -r '.[] | select(.fork == false) | .full_name')
              [ -z "$names" ] && break
              echo "$names"
              ((page++))
            done
          }

          sync_visibility() {
            local visibility=$1
            pushd "repos/$visibility" >/dev/null
            declare -A want=()

            for REPO in $(get_repos "$visibility"); do
              local DEFAULT_BRANCH DIR_NAME REPO_URL
              DEFAULT_BRANCH=$(curl -H "Authorization: token $GH_PAT" -s "https://api.github.com/repos/${REPO}" | jq -r '.default_branch')
              [ -z "$DEFAULT_BRANCH" ] || [ "$DEFAULT_BRANCH" = "null" ] && continue
              DIR_NAME="$(basename "$REPO")-$DEFAULT_BRANCH"
              REPO_URL="https://${GH_PAT}@github.com/${REPO}.git"
              want["$DIR_NAME"]=1

              if [ -d "$DIR_NAME/.git" ]; then
                # Update in place; rewrite remote URL in case the PAT rotated.
                if ! ( cd "$DIR_NAME" \
                       && git remote set-url origin "$REPO_URL" \
                       && git fetch --quiet --prune --tags origin "$DEFAULT_BRANCH" \
                       && git reset --hard --quiet "origin/$DEFAULT_BRANCH" ); then
                  echo "Update failed for $REPO; recloning."
                  rm -rf "$DIR_NAME"
                  git clone --quiet --branch "$DEFAULT_BRANCH" --single-branch "$REPO_URL" "$DIR_NAME" \
                    || echo "Failed to clone $REPO."
                fi
              else
                git clone --quiet --branch "$DEFAULT_BRANCH" --single-branch "$REPO_URL" "$DIR_NAME" \
                  || echo "Failed to clone $REPO."
              fi
            done

            # Drop cached clones for repos that no longer exist (deleted, renamed,
            # visibility-flipped, or default-branch changed).
            for d in */; do
              d="${d%/}"
              [ -z "${want[$d]:-}" ] && { echo "Pruning stale clone: $d"; rm -rf "$d"; }
            done
            popd >/dev/null
          }

          sync_visibility public
          sync_visibility private

          # Scrub PATs from on-disk remote URLs before the cache step saves repos/.
          find repos -type f -name config -path '*/.git/*' -print0 \
            | xargs -0 -r sed -i -E 's#https://[^@/]+@github\.com/#https://github.com/#g' || true

      - name: Count LOC snapshots (public/private)
        shell: bash
        run: |
          set -euo pipefail

          cloc repos/private \
            --exclude-ext=json,html,css,svg,md,ps1,scss,csv,prefab,unity,asset,meta \
            --exclude-dir=Library,Temp,obj,Build,build,.git \
            --json > output/cloc-private.json || echo '{"SUM":{"code":0}}' > output/cloc-private.json

          cloc repos/public \
            --exclude-ext=json,html,css,svg,md,ps1,scss,csv,prefab,unity,asset,meta \
            --exclude-dir=Library,Temp,obj,Build,build,.git \
            --json > output/cloc-public.json || echo '{"SUM":{"code":0}}' > output/cloc-public.json

      - name: Compute Additions/Deletions (weekly & lifetime)
        shell: bash
        env:
          AUTHOR_FILTER: ${{ secrets.AUTHOR_FILTER }} # optional e.g. "Pramit|pmazumder@"
        run: |
          set -euo pipefail
          shopt -s nullglob

          EXCLUDE_EXTS='(json|html|css|svg|md|ps1|scss|csv|prefab|unity|asset|meta)$'
          EXCLUDE_DIRS='/(Library|Temp|obj|Build|build|\.git)/'

          churn_dir() {
            local root="$1"
            local since="$2"   # "1 week ago" or empty
            local author="${3:-}"
            local total_add=0
            local total_del=0

            for repo in "$root"/*; do
              [ -d "$repo/.git" ] || continue
              pushd "$repo" >/dev/null

              # Ensure we have full history for the checked-out branch
              if git rev-parse --is-shallow-repository >/dev/null 2>&1; then
                git fetch --prune --unshallow --tags origin || git fetch --prune --depth=2147483647 --tags origin
              fi

              BR=$(git rev-parse --abbrev-ref HEAD)
              git fetch --quiet origin "$BR" || true

              declare -a ARGS=(--no-merges --numstat --format=%H)
              [ -n "$since" ] && ARGS+=(--since="$since")
              [ -n "$author" ] && ARGS+=(--author="$author")

              read -r add del < <(
                git log "${ARGS[@]}" \
                | awk -v exts="$EXCLUDE_EXTS" -v dirs="$EXCLUDE_DIRS" '
                    NF==1 { next }          # commit hash lines
                    NF>=3 {
                      a=$1; d=$2; file=$3
                      if (a == "-" || d == "-") next   # binary diffs
                      if (file ~ dirs) next            # excluded dirs
                      if (file ~ exts) next            # excluded exts
                      A += a; D += d
                    }
                    END { printf "%d %d", A+0, D+0 }
                  '
              )

              total_add=$((total_add + add))
              total_del=$((total_del + del))
              popd >/dev/null
            done

            printf '{"additions":%d,"deletions":%d}\n' "$total_add" "$total_del"
          }

          mkdir -p output
          echo "$(churn_dir repos/public  "1 week ago" "${AUTHOR_FILTER:-}")" > output/churn-public-week.json
          echo "$(churn_dir repos/private "1 week ago" "${AUTHOR_FILTER:-}")" > output/churn-private-week.json
          echo "$(churn_dir repos/public  ""            "${AUTHOR_FILTER:-}")" > output/churn-public-all.json
          echo "$(churn_dir repos/private ""            "${AUTHOR_FILTER:-}")" > output/churn-private-all.json

      - name: Build telemetry block
        shell: bash
        env:
          AUTHOR_FILTER: ${{ secrets.AUTHOR_FILTER }}
        run: python3 build_readme.py

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/cloc-*.json output/churn-*.json README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh telemetry"
          # Race-tolerant push: rebase on top of any concurrent raccoon update.
          for attempt in 1 2 3; do
            if git push origin HEAD; then exit 0; fi
            echo "push rejected, rebasing on origin/main (attempt $attempt)"
            git pull --rebase origin main
          done
          git push origin HEAD
